name: Backfill GHCR Tags (No Rebuild)

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: Source GHCR image name
        required: false
        default: ""
        type: string
      target_image:
        description: Target GHCR image name
        required: false
        default: ""
        type: string
      only_tags:
        description: Optional comma-separated tags to migrate (empty means all)
        required: false
        default: ""
        type: string
      force:
        description: Overwrite/copy even if destination tag exists
        required: false
        default: false
        type: boolean
      dry_run:
        description: Preview operations without copying
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  backfill:
    name: Retag Missing GHCR Tags
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install skopeo
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run backfill migration
        env:
          SOURCE_IMAGE: ${{ inputs.source_image }}
          TARGET_IMAGE: ${{ inputs.target_image }}
          ONLY_TAGS: ${{ inputs.only_tags }}
          FORCE: ${{ inputs.force }}
          DRY_RUN: ${{ inputs.dry_run }}
          DEFAULT_SOURCE_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-warp
          DEFAULT_TARGET_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          source_image="${SOURCE_IMAGE:-$DEFAULT_SOURCE_IMAGE}"
          target_image="${TARGET_IMAGE:-$DEFAULT_TARGET_IMAGE}"

          args=(
            --source-image "${source_image}"
            --target-image "${target_image}"
            --ignore-missing-source
          )

          if [[ -n "${ONLY_TAGS}" ]]; then
            args+=(--only-tags "${ONLY_TAGS}")
          fi
          if [[ "${FORCE}" == "true" ]]; then
            args+=(--force)
          fi
          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi

          ./warp/scripts/retag-ghcr-package.sh "${args[@]}"

      - name: Verify migration completeness
        if: inputs.dry_run != true
        env:
          SOURCE_IMAGE: ${{ inputs.source_image }}
          TARGET_IMAGE: ${{ inputs.target_image }}
          DEFAULT_SOURCE_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-warp
          DEFAULT_TARGET_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          source_image="${SOURCE_IMAGE:-$DEFAULT_SOURCE_IMAGE}"
          target_image="${TARGET_IMAGE:-$DEFAULT_TARGET_IMAGE}"
          ./warp/scripts/check-ghcr-retag-status.sh \
            --source-image "${source_image}" \
            --target-image "${target_image}" \
            --strict \
            --ignore-missing-source

      - name: Set completion signal
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh variable set GHCR_RETAG_COMPLETE --body "true"
          echo "Set repository variable GHCR_RETAG_COMPLETE=true"

      - name: Show final status
        env:
          SOURCE_IMAGE: ${{ inputs.source_image }}
          TARGET_IMAGE: ${{ inputs.target_image }}
          DEFAULT_SOURCE_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-warp
          DEFAULT_TARGET_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          source_image="${SOURCE_IMAGE:-$DEFAULT_SOURCE_IMAGE}"
          target_image="${TARGET_IMAGE:-$DEFAULT_TARGET_IMAGE}"
          ./warp/scripts/check-ghcr-retag-status.sh \
            --source-image "${source_image}" \
            --target-image "${target_image}"

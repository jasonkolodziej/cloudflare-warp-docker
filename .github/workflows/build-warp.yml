name: Build and Publish WARP Image

"on":
  push:
    branches:
      - main
    paths:
      - cloudflare/warp/**
      - .github/workflows/build-warp.yml
  pull_request:
    paths:
      - cloudflare/warp/**
  workflow_dispatch:
    inputs:
      GOST_VERSION:
        description: Version of gost. If empty, the latest version will be used.
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  packages: write

concurrency:
  group: build-warp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      gost_version: ${{ steps.get-gost-version.outputs.GOST_VERSION }}
      warp_version: ${{ steps.get-warp-client-version.outputs.WARP_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Get gost version
        id: get-gost-version
        run: |
          if [ -z "${{ github.event.inputs.GOST_VERSION }}" ]; then
            echo "GOST_VERSION=$(curl -fsSL -H 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' https://api.github.com/repos/ginuerzh/gost/releases/latest | jq -r '.tag_name' | cut -c 2-)" >> "$GITHUB_OUTPUT"
          else
            echo "GOST_VERSION=${{ github.event.inputs.GOST_VERSION }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify gost version
        run: |
          if [[ ! "${{ steps.get-gost-version.outputs.GOST_VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid gost version: ${{ steps.get-gost-version.outputs.GOST_VERSION }}"
            exit 1
          fi

      - name: Get WARP client version
        id: get-warp-client-version
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          echo "WARP_VERSION=$(apt-cache show cloudflare-warp | grep '^Version:' | awk '{print $2}' | sed 's/-[0-9]*$//')" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: rhel8
            os_family: rhel
            base_image: rockylinux:8
            distro: rhel
            os_version: "8"
            local_tag: warp:test-rhel8
          - name: debian11
            os_family: debian
            base_image: debian:11
            distro: debian
            os_version: "11"
            local_tag: warp:test-debian11
          - name: debian12
            os_family: debian
            base_image: debian:12
            distro: debian
            os_version: "12"
            local_tag: warp:test-debian12
          - name: debian13
            os_family: debian
            base_image: debian:13
            distro: debian
            os_version: "13"
            local_tag: warp:test-debian13
          - name: fedora34
            os_family: rhel
            base_image: fedora:34
            distro: fedora
            os_version: "34"
            local_tag: warp:test-fedora34
          - name: fedora35
            os_family: rhel
            base_image: fedora:35
            distro: fedora
            os_version: "35"
            local_tag: warp:test-fedora35
          - name: ubuntu2004
            os_family: debian
            base_image: ubuntu:20.04
            distro: ubuntu
            os_version: "20.04"
            local_tag: warp:test-ubuntu2004
          - name: ubuntu2204
            os_family: debian
            base_image: ubuntu:22.04
            distro: ubuntu
            os_version: "22.04"
            local_tag: warp:test-ubuntu2204
          - name: ubuntu2404
            os_family: debian
            base_image: ubuntu:24.04
            distro: ubuntu
            os_version: "24.04"
            local_tag: warp:test-ubuntu2404

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Preflight check cloudflare-warp availability
        env:
          BASE_IMAGE: ${{ matrix.variant.base_image }}
          OS_FAMILY: ${{ matrix.variant.os_family }}
        run: |
          set -euo pipefail
          echo "Preflight checking cloudflare-warp package for ${BASE_IMAGE} (${OS_FAMILY})"

          if [ "${OS_FAMILY}" = "debian" ]; then
            docker run --rm "${BASE_IMAGE}" /bin/sh -lc '
              set -eu
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq ca-certificates curl gnupg lsb-release
              curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
              echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" > /etc/apt/sources.list.d/cloudflare-client.list
              apt-get update -qq
              apt-cache show cloudflare-warp >/dev/null
            '
          elif [ "${OS_FAMILY}" = "rhel" ]; then
            docker run --rm "${BASE_IMAGE}" /bin/sh -lc '
              set -eu
              if command -v dnf >/dev/null 2>&1; then PM=dnf;
              elif command -v yum >/dev/null 2>&1; then PM=yum;
              elif command -v microdnf >/dev/null 2>&1; then PM=microdnf;
              else echo "No supported RPM package manager found" && exit 1; fi
              $PM -y install ca-certificates curl >/dev/null
              rpm --import https://pkg.cloudflareclient.com/pubkey.gpg
              curl -fsSL https://pkg.cloudflareclient.com/cloudflare-warp-ascii.repo > /etc/yum.repos.d/cloudflare-warp.repo
              $PM -y makecache >/dev/null 2>&1 || true
              $PM -y info cloudflare-warp >/dev/null
            '
          else
            echo "Unsupported OS_FAMILY: ${OS_FAMILY}"
            exit 1
          fi

      - name: Build and load test image
        uses: docker/build-push-action@v6
        with:
          context: cloudflare/warp
          file: cloudflare/warp/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          provenance: false
          sbom: false
          tags: ${{ matrix.variant.local_tag }}
          build-args: |
            OS_FAMILY=${{ matrix.variant.os_family }}
            BASE_IMAGE=${{ matrix.variant.base_image }}
            GOST_VERSION=${{ needs.prepare.outputs.gost_version }}
            WARP_VERSION=${{ needs.prepare.outputs.warp_version }}
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=warp-${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.name }}

      - name: Smoke test image contents
        run: |
          docker run --rm --entrypoint /bin/bash ${{ matrix.variant.local_tag }} -lc '
            set -e
            command -v sudo
            command -v dbus-daemon
            command -v warp-cli
            command -v warp-svc
            command -v gost
            command -v nft
            command -v ip
            command -v jq
            command -v ipcalc
            test -x /entrypoint.sh
            test -x /healthcheck/index.sh
            bash -n /entrypoint.sh
            bash -n /healthcheck/index.sh
            bash -n /healthcheck/fix-host-connectivity.sh
          '

  docker:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - test
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: rhel8
            os_family: rhel
            base_image: rockylinux:8
            distro: rhel
            os_version: "8"
          - name: debian11
            os_family: debian
            base_image: debian:11
            distro: debian
            os_version: "11"
          - name: debian12
            os_family: debian
            base_image: debian:12
            distro: debian
            os_version: "12"
          - name: debian13
            os_family: debian
            base_image: debian:13
            distro: debian
            os_version: "13"
          - name: fedora34
            os_family: rhel
            base_image: fedora:34
            distro: fedora
            os_version: "34"
          - name: fedora35
            os_family: rhel
            base_image: fedora:35
            distro: fedora
            os_version: "35"
          - name: ubuntu2004
            os_family: debian
            base_image: ubuntu:20.04
            distro: ubuntu
            os_version: "20.04"
          - name: ubuntu2204
            os_family: debian
            base_image: ubuntu:22.04
            distro: ubuntu
            os_version: "22.04"
          - name: ubuntu2404
            os_family: debian
            base_image: ubuntu:24.04
            distro: ubuntu
            os_version: "24.04"
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-warp

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Find open PR for pushed branch
        id: pr_lookup
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:${branch}`;

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              per_page: 1,
            });

            const pr = prs.data[0];
            core.setOutput('number', pr ? String(pr.number) : '');
            core.setOutput('found', pr ? 'true' : 'false');

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,prefix=v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-
            type=ref,event=pr,prefix=v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-
            type=raw,value=v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-pr-${{ steps.pr_lookup.outputs.number }},enable=${{ github.event_name == 'push' && steps.pr_lookup.outputs.found == 'true' }}
            type=sha,prefix=v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-
            type=raw,value=v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-latest,enable={{is_default_branch}}
            type=raw,value=v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-${{ matrix.variant.os_version }},enable=${{ matrix.variant.os_version != '' }}
            type=raw,value=v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-${{ matrix.variant.os_version }}-gost-${{ needs.prepare.outputs.gost_version }},enable=${{ matrix.variant.os_version != '' }}
            type=raw,value=v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-${{ matrix.variant.os_version }}-gost-${{ needs.prepare.outputs.gost_version }}-${{ github.sha }},enable=${{ matrix.variant.os_version != '' }}
            type=raw,value=${{ matrix.variant.distro }}-latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.variant.distro }}-${{ matrix.variant.os_version }},enable=${{ matrix.variant.os_version != '' && github.ref_name == 'main' }}
            type=raw,value=${{ matrix.variant.distro }}-${{ matrix.variant.os_version }}-gost-${{ needs.prepare.outputs.gost_version }},enable=${{ matrix.variant.os_version != '' }}
            type=raw,value=${{ matrix.variant.distro }}-${{ matrix.variant.os_version }}-gost-${{ needs.prepare.outputs.gost_version }}-${{ github.sha }},enable=${{ matrix.variant.os_version != '' }}

      - name: Show resolved image tags
        run: |
          echo "Resolved tags for ${{ matrix.variant.name }}:"
          printf '%s\n' "${{ steps.meta.outputs.tags }}"

      - name: Validate main branch tags
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: |
          tags="${{ steps.meta.outputs.tags }}"
          echo "$tags" | grep -E ':v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-main$' >/dev/null
          echo "$tags" | grep -E ':v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-sha-[0-9a-f]+' >/dev/null
          echo "$tags" | grep -E ':v${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.distro }}-latest$' >/dev/null
          echo "$tags" | grep -E ':${{ matrix.variant.distro }}-latest$' >/dev/null

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: cloudflare/warp
          file: cloudflare/warp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OS_FAMILY=${{ matrix.variant.os_family }}
            BASE_IMAGE=${{ matrix.variant.base_image }}
            GOST_VERSION=${{ needs.prepare.outputs.gost_version }}
            WARP_VERSION=${{ needs.prepare.outputs.warp_version }}
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=warp-${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.name }}
          cache-to: type=gha,mode=min,scope=warp-${{ needs.prepare.outputs.warp_version }}-${{ matrix.variant.name }}
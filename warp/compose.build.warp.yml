#? https://pkg.cloudflareclient.com


services:
  warp:
    image: flow-reduce/warp:rhel
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OS_FAMILY: ${OS_FAMILY:-rhel}
        BASE_IMAGE: ${BASE_IMAGE:-redhat/ubi9-minimal:9.5}
        GOST_VERSION: ${GOST_VERSION:-3.1.0}
    container_name: warp
    restart: always
    # add removed rule back (https://github.com/opencontainers/runc/pull/3468)
    device_cgroup_rules:
      - 'c 10:200 rwm'
    ports:
      - "1080:1080"
    environment:
      - WARP_SLEEP=${WARP_SLEEP:-2}
      - WARP_CONNECTOR_TOKEN=${WARP_CONNECTOR_TOKEN:-}
      # - WARP_LICENSE_KEY= # optional
      # - WARP_ENABLE_NAT=1 # enable nat
    cap_add:
      # Docker already have them, these are for podman users
      - MKNOD
      - AUDIT_WRITE
      # additional required cap for warp, both for podman and docker
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
      # uncomment for nat
      # - net.ipv4.ip_forward=1
      # - net.ipv6.conf.all.forwarding=1
      # - net.ipv6.conf.all.accept_ra=2
    volumes:
      - ./data:/var/lib/cloudflare-warp
